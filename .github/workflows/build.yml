name: Compilar APK con Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código fuente
      uses: actions/checkout@v4

    - name: Configurar Entorno Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar dependencias del sistema Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libjpeg-dev python3-pip python3-setuptools
        pip3 install --user --upgrade buildozer Cython==0.29.33 virtualenv

    - name: Aceptar Licencias de Android SDK Automáticamente
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        yes | sdkmanager --licenses || true

    - name: Compilar APK en modo Debug
      run: |
        export PATH=$PATH:$HOME/.local/bin
        buildozer android debug
